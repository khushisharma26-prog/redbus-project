<div class="container">
  <div class="card">
    <h2>{{ lang.t('bookTicket') }}</h2>

    <div class="success-message" *ngIf="message && message.includes('successful')">
      {{ message }}
    </div>
    <div class="error-message" *ngIf="message && !message.includes('successful')">
      {{ message }}
    </div>

    <form (ngSubmit)="submitBooking()" #bookingForm="ngForm">

      <div class="input-group">
        <label>{{ lang.t('name') }}</label>
        <input
          type="text"
          [placeholder]="'Enter ' + lang.t('name')"
          [(ngModel)]="bookingData.name"
          name="name"
          required
        />
      </div>

      <div class="input-group">
        <label>{{ lang.t('email') }}</label>
        <input
          type="email"
          [placeholder]="'Enter ' + lang.t('email')"
          [(ngModel)]="bookingData.email"
          name="email"
          required
        />
      </div>

      <div class="input-group">
        <label>{{ lang.t('source') }}</label>
        <input
          type="text"
          [placeholder]="'Enter ' + lang.t('source')"
          [(ngModel)]="bookingData.source"
          name="source"
          required
        />
      </div>

      <div class="input-group">
        <label>{{ lang.t('destination') }}</label>
        <input
          type="text"
          [placeholder]="'Enter ' + lang.t('destination')"
          [(ngModel)]="bookingData.destination"
          name="destination"
          required
        />
      </div>

      <div class="input-group">
        <label>Travel Date</label>
        <input
          type="date"
          [(ngModel)]="bookingData.date"
          name="date"
          required
        />
      </div>

      <button type="submit" class="auth-btn" [disabled]="loading" style="margin-top:10px;">
        <span *ngIf="!loading">Confirm Booking</span>
        <span *ngIf="loading">Processing...</span>
      </button>

    </form>
  </div>
</div>
